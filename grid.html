<!DOCTYPE html>
<html>
<head>
    <title>Product Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4 shadow bg-white p-4 rounded">
    <h2 class="mb-4">Product List</h2>

    <?php if (isset($error)): ?>
        <div class="alert alert-danger"><?= $error ?></div>
    <?php elseif (isset($_GET['msg'])): ?>
        <div class="alert alert-success">Successfully <?= $_GET['msg'] ?>.</div>
    <?php endif; ?>

    <form method="POST" action="delete.php" id="gridForm">
        <div class="d-flex justify-content-between mb-3">
            <button type="submit" name="action" value="delete" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete selected rows?');">Delete Selected</button>
            <button type="button" class="btn btn-primary" onclick="window.location.href='add.php';">Add New Product</button>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th style="width: 40px;"><input class="form-check-input" type="checkbox"></th>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th>Created Date</th>
                        <th>Updated Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <?php if ($products): ?>
                        <?php foreach ($products as $row): ?>
                            <tr>
                                <td><input class="form-check-input" type="checkbox" name="selected_ids[]" value="<?= $row['product_id'] ?>"></td>
                                <td><?= $row['product_id'] ?></td>
                                <td><?= $row['name'] ?></td>
                                <td><?= $row['quantity'] ?></td>
                                <td>$<?= number_format($row['price'], 2) ?></td>
                                <td><?= $row['description'] ?></td>
                                <td>
                                    <?php if($row['status'] == 1): ?>
                                        <span class="badge bg-success">Enabled</span>
                                    <?php else: ?>
                                        <span class="badge bg-secondary">Disabled</span>
                                    <?php endif; ?>
                                </td>
                                <td><?= $row['created_date'] ?></td>
                                <td><?= $row['updated_date'] ?? 'N/A' ?></td>
                                <td><a href="update.php?id=<?= $row['product_id'] ?>" class="btn btn-sm btn-outline-primary">Edit</a></td>
                            </tr>
                        <?php endforeach; ?>
                    <?php else: ?>
                        <tr>
                            <td colspan="10" class="text-center text-muted py-4">No products found. Add one to get started!</td>
                        </tr>
                    <?php endif; ?>
                </tbody>
            </table>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
