<!DOCTYPE html>
<html>
<head>
    <title><?= $isEdit ? 'Edit' : 'New' ?> Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 shadow bg-white p-4 rounded">
            <h2 class="mb-4"><?= $isEdit ? 'Edit' : 'New' ?> Product</h2>

            <?php if (isset($error)): ?>
                <div class="alert alert-danger"><?= $error ?></div>
            <?php endif; ?>

            <form method="POST" action="">
                <?php if ($isEdit): ?>
                    <input type="hidden" name="product[product_id]" value="<?= $product->value('product_id') ?>">
                <?php endif; ?>

                <div class="mb-3">
                    <label class="form-label fw-bold">Name</label>
                    <input type="text" class="form-control" name="product[name]" required value="<?= $product->value('name') ?? '' ?>">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Quantity</label>
                    <input type="number" class="form-control" name="product[quantity]" required value="<?= $product->value('quantity') ?? '0' ?>">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Price</label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control" step="0.01" name="product[price]" required value="<?= $product->value('price') ?? '0.00' ?>">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea class="form-control" name="product[description]" rows="4"><?= $product->value('description') ?? '' ?></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Status</label>
                    <select class="form-select" name="product[status]">
                        <option value="1" <?= ($product->value('status') == 1) ? 'selected' : '' ?>>Enabled</option>
                        <option value="2" <?= ($product->value('status') == 2) ? 'selected' : '' ?>>Disabled</option>
                    </select>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <button type="submit" class="btn btn-success px-4">Save</button>
                    <button type="button" class="btn btn-outline-secondary px-4" onclick="window.location.href='index.php';">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
